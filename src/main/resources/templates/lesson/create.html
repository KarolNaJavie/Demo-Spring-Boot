<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Management System</title>
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
          crossorigin="anonymous">

    <!--
        jQuery - biblioteka JavaScript potrzebna do AJAX.
        Uzywamy jej funkcji $.getJSON() do pobierania danych z serwera bez przeladowania strony.
    -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body>
<nav class="navbar navbar-expand navbar-dark bg-dark mb-4"><div class="container"><span class="navbar-brand">Management System</span><div class="navbar-nav"><a class="nav-link" href="/students">Studenci</a><a class="nav-link" href="/teachers">Nauczyciele</a><a class="nav-link" href="/lessons">Lekcje</a></div></div></nav>
<br>
<br>
<div class="container">
    <div class="row">
        <div class="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
            <h1 class="text-center"> Create New Lesson </h1>
            <div class="card-body">
                <form action="/lessons/create" method="POST">
                    <div class="form-group">
                        <label> Date </label>
                        <input type="datetime-local" name="datetime" class="form-control"
                               placeholder="Enter Date" required/>
                    </div>
                    <div class="form-group">
                        <label> Teacher </label><br/>
                        <!--
                            onchange="populateStudents(...)" - gdy uzytkownik wybierze nauczyciela,
                            JavaScript automatycznie zaladuje liste jego studentow do dropdowna ponizej.
                            Bez AJAX musielibysmy pokazywac wszystkich studentow z bazy naraz.
                        -->
                        <select id="teacherSelectId" name="teacherId" required
                                onchange="populateStudents(this.id, 'studentSelectId')">
                            <option value="" disabled selected>select teacher</option>
                            <!--
                                Lista nauczycieli jest renderowana przez Thymeleaf po stronie serwera
                                (standardowe th:each - to NIE jest AJAX, to zwykly Thymeleaf)
                            -->
                            <option th:each="teacher : ${teachers}"
                                    th:text="${teacher.firstName + ' ' + teacher.lastName}"
                                    th:value="${teacher.id}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label> Student </label><br/>
                        <!--
                            Ten select jest poczatkowo pusty.
                            Zostanie wypelniony przez AJAX po wyborze nauczyciela powyzej.
                        -->
                        <select id="studentSelectId" name="studentId" required>
                            <option value="" disabled selected>select student</option>
                        </select>
                    </div>
                    <div class="box-footer">
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>

<script type="text/javascript">
    /*
     * AJAX - Asynchronous JavaScript And XML
     *
     * Gdy uzytkownik wybierze nauczyciela, chcemy pokazac tylko jego studentow.
     * Zamiast przeladowywac strone z nowym requestem, wysylamy zapytanie w tle.
     *
     * Przyklad dla nauczyciela o id=3:
     *   1. Uzytkownik wybiera nauczyciela z dropdowna
     *   2. Przegladarka wywoluje populateStudents()
     *   3. Funkcja wysyla GET /students?teacher=3
     *   4. StudentController.findAllByTeacher() zwraca List<StudentDto> jako JSON
     *   5. Funkcja wstawia studentow do dropdowna - bez przeladowania strony
     */
    function populateStudents(teacherSelectId, studentSelectId) {
        // Pobieramy referencje do elementow HTML po id
        const tSelect = document.getElementById(teacherSelectId);
        const sSelect = document.getElementById(studentSelectId);

        // Budujemy URL - przekazujemy id nauczyciela jako parametr zapytania
        // Spring automatycznie zamieni to id na obiekt Teacher (DomainClassConverter)
        const url = `/students?teacher=${tSelect.value}`;

        // $.getJSON() - asynchroniczny GET request przez jQuery
        // "students" w callbacku to tablica JSON ze studentami danego nauczyciela
        $.getJSON(url, function (students) {

            // Czyscimy dropdown ze starych opcji
            sSelect.innerHTML = '<option value="" disabled selected>select student</option>';

            // Dla kazdego studenta zwroconego przez serwer tworzymy opcje w dropdownie
            students.forEach(student => {
                // value="id" trafi jako parametr studentId do LessonController.save()
                const option = `<option value="${student.id}">${student.firstName} ${student.lastName}</option>`;
                sSelect.innerHTML += option;
            })
        });
    }
</script>
