<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Management System</title>
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
          crossorigin="anonymous">

    <!--
        jQuery potrzebne do wyslania asynchronicznego POST requestu
        po kliknieciu przycisku Submit - bez uzycia <form method="POST">.
    -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body>
<nav class="navbar navbar-expand navbar-dark bg-dark mb-4"><div class="container"><span class="navbar-brand">Management System</span><div class="navbar-nav"><a class="nav-link" href="/students">Studenci</a><a class="nav-link" href="/teachers">Nauczyciele</a><a class="nav-link" href="/lessons">Lekcje</a></div></div></nav>
<br>
<br>
<div class="container">
    <div class="row">
        <div class="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
            <h1 class="text-center"> Change Teacher </h1>
            <div class="card-body">

                <!-- Tabela pokazuje aktualne dane studenta (renderowane przez Thymeleaf, nie AJAX) -->
                <table class="table table-striped table-bordered">
                    <thead class="table-dark">
                    <tr>
                        <th> ID</th>
                        <th> First Name</th>
                        <th> Last Name</th>
                        <th> Language</th>
                        <th> Teacher</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td th:text="${student.id}"></td>
                        <td th:text="${student.firstName}"></td>
                        <td th:text="${student.lastName}"></td>
                        <td th:text="${student.language}"></td>
                        <td th:text="${student.teacher}"></td>
                    </tr>
                    </tbody>
                </table>

                <div class="form-group">
                    <label> Teachers </label><br/>
                    <!--
                        Lista nauczycieli przefiltrowana po jezyku studenta -
                        zaladowana przez Thymeleaf (StudentController.getEditView()
                        wywoluje teacherService.findAllByLanguage(student.getLanguage()))
                    -->
                    <select id="teacherSelectId" name="teacherId" required>
                        <option value="" disabled selected>select teacher</option>
                        <option th:each="teacher : ${teachers}"
                                th:text="${teacher.firstName + ' ' + teacher.lastName}"
                                th:value="${teacher.id}"></option>
                    </select>
                </div>

                <div class="box-footer">
                    <!--
                        th:value="${student.id}" - wstrzykujemy id studenta jako wartosc przycisku,
                        zeby funkcja JavaScript wiedzial na ktorym studencie operuje.
                        onclick="changeTeacher(...)" - zamiast submit formularza, wywolujemy AJAX.
                    -->
                    <button id="submitBtnId" th:value="${student.id}" type="submit"
                            class="btn btn-primary"
                            onclick="changeTeacher(this.id, 'teacherSelectId')">
                        Submit
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>

<script type="text/javascript">
    /*
     * AJAX - tu uzywamy $.ajax() zamiast $.getJSON(), bo wysylamy POST (nie GET).
     *
     * Dlaczego nie zwykly <form method="POST">?
     * Mozna byloby uzyc formularza, ale wtedy musielibysmy przekazac teacherId
     * jako ukryte pole i zmienic endpoint kontrolera. AJAX jest tu prostszy,
     * bo id studenta i nauczyciela trafiaja bezposrednio w URL.
     *
     * Przyklad: student id=5, wybrany nauczyciel id=2:
     *   1. Uzytkownik klika Submit
     *   2. changeTeacher() wysyla POST /students/5/changeTeacher/2
     *   3. StudentController.changeTeacher() wywoluje studentService.updateTeacher(5, 2)
     *   4. Jesli operacja sie uda - przegladarka przekierowuje na /students
     *   5. Jesli blad (np. jezyk nie pasuje) - wyswietla alert
     */
    function changeTeacher(btnId, teacherSelectId) {
        // Pobieramy przycisk - przechowuje id studenta w atrybucie value (ustawione przez th:value)
        let btn = document.getElementById(btnId);

        // Pobieramy dropdown z nauczycielami - value to id wybranego nauczyciela
        let tSelect = document.getElementById(teacherSelectId);

        // Budujemy URL endpointu - trafia do StudentController.changeTeacher()
        let url = "/students/" + btn.value + "/changeTeacher/" + tSelect.value;

        $.ajax({
            url: url,
            method: 'POST',    // wysylamy POST request (wymaga @PostMapping po stronie serwera)
            success: function () {
                // Jesli serwer odpowiedzial 2xx - przechodzimy na liste studentow
                window.location.href = "/students";
            },
            error: function () {
                // Jesli serwer odpowiedzial bledem (np. 400, 500) - pokazujemy alert
                // Przyklad: LanguageMismatchException gdy jezyk studenta nie pasuje do nauczyciela
                alert("Something went wrong!");
            }
        });
    }
</script>
