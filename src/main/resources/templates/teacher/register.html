<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Management System</title>
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
          crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand navbar-dark bg-dark mb-4"><div class="container"><span class="navbar-brand">Management System</span><div class="navbar-nav"><a class="nav-link" href="/students">Studenci</a><a class="nav-link" href="/teachers">Nauczyciele</a><a class="nav-link" href="/lessons">Lekcje</a></div></div></nav>
<br>
<br>
<div class="container">
    <div class="row">
        <div class="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
            <h1 class="text-center"> Create New Teacher </h1>
            <div class="card-body">
                <form action="/teachers/create" method="POST">
                    <div class="form-group">
                        <label> First Name </label>
                        <input type="text" name="firstName" class="form-control"
                               placeholder="Enter First Name" required/>
                    </div>
                    <div class="form-group">
                        <label> Last Name </label>
                        <input type="text" name="lastName" class="form-control"
                               placeholder="Enter Last Name" required/>
                    </div>
                    <div class="form-group">
                        <label> Languages </label><br/>
                        <select name="languages" required multiple>
                            <option th:each="language : ${languages}" th:text="${language}"
                                    th:value="${language}"></option>
                        </select>
                    </div>
                    <div class="box-footer">
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
